<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>/* PWA-KILL-SWITCH */ try { if ("serviceWorker" in navigator) { navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => { try { r.unregister(); } catch(e){} })).catch(()=>{}); } if (window.caches) { caches.keys().then(ks => ks.forEach(k => caches.delete(k))).catch(()=>{}); } } catch(e){}</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <title>Entrar</title>

  <link rel="icon" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="app.css?v=12">

  <style>
    /* ─── LOGIN v2 — estilo Opal adaptado pra Garage Training ──────────── */
    .lg2-page {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      background: #0a0a0a;
    }
    .lg2-wrap {
      width: 100%; max-width: 380px;
      display: flex; flex-direction: column;
      gap: 0;
    }
    .lg2-logo-box {
      display: flex; justify-content: center;
      margin-bottom: 22px;
    }
    .lg2-logo-fallback {
      width: 56px; height: 56px;
      border-radius: 10px;
      background: #fff;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 18px; letter-spacing: 1px;
      color: #000;
      font-weight: 700;
    }
    .lg2-logo-img {
      width: 70px; height: 70px;
      border-radius: 10px;
      object-fit: cover;
    }
    .lg2-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px; letter-spacing: 2px;
      color: #fff; text-align: center;
      line-height: 1.1; margin: 0 0 6px;
    }
    .lg2-sub {
      font-size: 12px; letter-spacing: 1.5px;
      color: rgba(255,255,255,0.5);
      text-align: center;
      text-transform: uppercase;
      margin: 0 0 28px;
    }
    .lg2-input {
      width: 100%;
      background: transparent;
      color: #fff;
      border: 0.5px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 14px 20px;
      font-size: 13px;
      font-family: inherit;
      box-sizing: border-box;
      transition: border-color 0.2s;
      margin-bottom: 12px;
    }
    .lg2-input:focus { outline: none; border-color: rgba(255,255,255,0.6); }
    .lg2-input::placeholder { color: rgba(255,255,255,0.4); }

    .lg2-forgot {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.55);
      margin: 14px 0 22px;
      cursor: pointer;
      background: none; border: none;
      width: 100%;
      font-family: inherit;
    }
    .lg2-forgot:hover { color: #fff; }

    .lg2-submit {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 999px;
      padding: 14px;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
      font-family: inherit;
    }
    .lg2-submit:hover:not(:disabled) { opacity: 0.85; }
    .lg2-submit:active:not(:disabled) { transform: scale(0.99); }
    .lg2-submit:disabled { opacity: 0.4; cursor: not-allowed; }

    .lg2-divider {
      display: flex; align-items: center; gap: 14px;
      margin: 24px 0 18px;
    }
    .lg2-divider::before, .lg2-divider::after {
      content: ''; flex: 1;
      height: 0.5px; background: rgba(255,255,255,0.15);
    }
    .lg2-divider span {
      font-size: 11px; color: rgba(255,255,255,0.4);
    }

    .lg2-google {
      width: 100%;
      background: rgba(255,255,255,0.04);
      color: #fff;
      border: 0.5px solid rgba(255,255,255,0.2);
      border-radius: 999px;
      padding: 13px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      gap: 10px;
      transition: background 0.2s, border-color 0.2s;
      font-family: inherit;
    }
    .lg2-google:hover:not(:disabled) {
      background: rgba(255,255,255,0.08);
      border-color: rgba(255,255,255,0.35);
    }
    .lg2-google:disabled { opacity: 0.5; cursor: wait; }

    .lg2-hint {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,0.5);
      margin-top: 28px;
    }
    .lg2-hint a { color: #fff; text-decoration: underline; }

    .lg2-err {
      font-size: 12px;
      color: #e05050;
      text-align: center;
      min-height: 16px;
      margin: 4px 0 0;
    }

    @media (max-width: 480px) {
      .lg2-page { padding: 20px 18px; }
      .lg2-title { font-size: 26px; }
    }
  </style>
</head>
<body class="lg2-page">
  <div class="lg2-wrap">
    <div class="lg2-logo-box">
      <img id="brand-logo" class="lg2-logo-img" style="display:none" alt="">
      <div id="brand-fallback" class="lg2-logo-fallback">GT</div>
    </div>

    <h1 class="lg2-title" id="brand-name">Bem-vindo de volta</h1>
    <p class="lg2-sub" id="brand-sub">Garage Training</p>

    <form id="login-form" autocomplete="on">
      <input class="lg2-input" type="email" id="email" required autocomplete="email" placeholder="Seu e-mail">
      <input class="lg2-input" type="password" id="password" required autocomplete="current-password" placeholder="Sua senha">
      <div class="lg2-err" id="err-msg"></div>
      <button class="lg2-submit" type="submit" id="submit-btn">Entrar</button>
    </form>

    <button type="button" class="lg2-forgot" id="forgot-btn">Esqueceu a senha?</button>

    <div class="lg2-divider"><span>ou</span></div>

    <button type="button" class="lg2-google" id="google-btn">
      <svg width="16" height="16" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path fill="#FFC107" d="M43.6 20.1H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
        <path fill="#FF3D00" d="M6.3 14.7l6.6 4.8C14.7 15.1 19 12 24 12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 16.3 4 9.7 8.3 6.3 14.7z"/>
        <path fill="#4CAF50" d="M24 44c5.2 0 9.9-2 13.4-5.2l-6.2-5.2c-2 1.5-4.5 2.4-7.2 2.4-5.2 0-9.6-3.3-11.3-7.9l-6.5 5C9.5 39.6 16.2 44 24 44z"/>
        <path fill="#1976D2" d="M43.6 20.1H42V20H24v8h11.3c-.8 2.2-2.2 4.1-4 5.6l6.2 5.2c-.4.4 6.5-4.8 6.5-14.8 0-1.3-.1-2.6-.4-3.9z"/>
      </svg>
      Continuar com Google
    </button>

    <p class="lg2-hint">
      Não tem conta? <a href="/cadastro.html">Cadastre-se</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <script>
  (function() {
    'use strict';

    const errEl = document.getElementById('err-msg');
    const submitBtn = document.getElementById('submit-btn');
    const googleBtn = document.getElementById('google-btn');
    const forgotBtn = document.getElementById('forgot-btn');
    const form = document.getElementById('login-form');

    function waitForSb(maxTries = 50) {
      return new Promise((resolve, reject) => {
        let tries = 0;
        const check = () => {
          if (window.sb && window.sb.auth) return resolve(window.sb);
          if (++tries >= maxTries) return reject(new Error('Supabase não inicializou'));
          setTimeout(check, 100);
        };
        check();
      });
    }

    async function init() {
      try {
        const sb = await waitForSb();

        // Carrega logo/nome da academia (não bloqueia)
        try {
          const { data } = await sb.from('config').select('nome_academia, logo_url').eq('id', 1).single();
          if (data) {
            if (data.logo_url) {
              const img = document.getElementById('brand-logo');
              img.src = data.logo_url;
              img.style.display = 'block';
              document.getElementById('brand-fallback').style.display = 'none';
            }
            if (data.nome_academia) {
              document.title = data.nome_academia;
              document.getElementById('brand-sub').textContent = data.nome_academia;
              // Iniciais pro fallback
              const initials = data.nome_academia.split(' ').filter(Boolean).map(p => p[0]).join('').slice(0,2).toUpperCase();
              document.getElementById('brand-fallback').textContent = initials || 'GT';
            }
          }
        } catch (e) { /* segue sem config */ }

        // Já logado? Redireciona
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          window.location.href = '/app.html';
          return;
        }

        // ── Login por e-mail/senha ──
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          errEl.textContent = '';
          submitBtn.disabled = true;
          submitBtn.textContent = 'Entrando...';

          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;

          try {
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) throw error;
            window.location.href = '/app.html';
          } catch (err) {
            console.error('[login] Erro:', err);
            errEl.textContent = err.message === 'Invalid login credentials'
              ? 'E-mail ou senha inválidos.'
              : 'Erro: ' + err.message;
            submitBtn.disabled = false;
            submitBtn.textContent = 'Entrar';
          }
        });

        // ── Login com Google ──
        googleBtn.addEventListener('click', async () => {
          errEl.textContent = '';
          googleBtn.disabled = true;
          try {
            const { error } = await sb.auth.signInWithOAuth({
              provider: 'google',
              options: {
                redirectTo: window.location.origin + '/app.html'
              }
            });
            if (error) throw error;
            // Vai redirecionar — não precisa de window.location aqui
          } catch (err) {
            console.error('[login google] Erro:', err);
            errEl.textContent = err.message.includes('provider is not enabled')
              ? 'Login com Google ainda não está habilitado. Avise o admin.'
              : 'Erro: ' + err.message;
            googleBtn.disabled = false;
          }
        });

        // ── Esqueci a senha ──
        forgotBtn.addEventListener('click', async () => {
          const email = document.getElementById('email').value.trim();
          if (!email) {
            errEl.textContent = 'Digite seu e-mail acima primeiro.';
            return;
          }
          errEl.textContent = '';
          try {
            const { error } = await sb.auth.resetPasswordForEmail(email, {
              redirectTo: window.location.origin + '/index.html'
            });
            if (error) throw error;
            errEl.style.color = '#4ade80';
            errEl.textContent = 'Link de recuperação enviado pro seu e-mail.';
          } catch (err) {
            errEl.style.color = '#e05050';
            errEl.textContent = 'Erro: ' + err.message;
          }
        });

      } catch (err) {
        console.error('[login] Erro de inicialização:', err);
        errEl.textContent = 'Erro ao carregar. Recarregue a página.';
      }
    }

    init();
  })();
  </script>
</body>
</html>
