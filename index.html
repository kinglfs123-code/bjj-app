<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>/* PWA-KILL-SWITCH */ try { if ("serviceWorker" in navigator) { navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => { try { r.unregister(); } catch(e){} })).catch(()=>{}); } if (window.caches) { caches.keys().then(ks => ks.forEach(k => caches.delete(k))).catch(()=>{}); } } catch(e){}</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <title>Entrar</title>

  <link rel="icon" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="app.css?v=15">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-box">

      <!-- Logo: imagem (se existir) OU fallback com iniciais -->
      <img id="brand-logo" class="login-logo-img" src="" alt="" style="display:none">
      <div id="brand-fallback" class="login-logo-fallback">·</div>

      <!-- Nome da academia em destaque -->
      <div class="login-logo" id="brand-name">·</div>
      <div class="login-sub">Acesso ao aplicativo</div>

      <form id="login-form" autocomplete="on">
        <div class="form-row">
          <label class="form-label" for="email">E-mail</label>
          <input class="form-input" type="email" id="email" required autocomplete="email" placeholder="seu@email.com">
        </div>
        <div class="form-row">
          <label class="form-label" for="password">Senha</label>
          <input class="form-input" type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <div class="form-err" id="err-msg"></div>
        <button class="form-submit" type="submit" id="submit-btn">Entrar</button>
      </form>

      <button type="button" class="login-link-btn" id="forgot-btn">Esqueceu a senha?</button>

      <div class="login-divider"><span>ou</span></div>

      <button type="button" class="login-google-btn" id="google-btn">
        <svg width="14" height="14" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#ffffff" d="M43.6 20.1H42V20H24v8h11.3c-1.6 4.7-6.1 8-11.3 8-6.6 0-12-5.4-12-12s5.4-12 12-12c3.1 0 5.8 1.2 7.9 3l5.7-5.7C34 6.1 29.3 4 24 4 12.9 4 4 12.9 4 24s8.9 20 20 20 20-8.9 20-20c0-1.3-.1-2.6-.4-3.9z"/>
        </svg>
        Continuar com Google
      </button>

      <div class="login-hint">
        Não tem conta? <a href="/cadastro.html">Cadastre-se</a>
      </div>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
  (function() {
    'use strict';

    const errEl = document.getElementById('err-msg');
    const submitBtn = document.getElementById('submit-btn');
    const googleBtn = document.getElementById('google-btn');
    const forgotBtn = document.getElementById('forgot-btn');
    const form = document.getElementById('login-form');

    function waitForSb(maxTries = 50) {
      return new Promise((resolve, reject) => {
        let tries = 0;
        const check = () => {
          if (window.sb && window.sb.auth) return resolve(window.sb);
          if (++tries >= maxTries) return reject(new Error('Supabase não inicializou'));
          setTimeout(check, 100);
        };
        check();
      });
    }

    function showError(msg, isOk) {
      errEl.style.color = isOk ? '#4ade80' : '#e05050';
      errEl.textContent = msg || '';
    }

    async function init() {
      try {
        const sb = await waitForSb();

        // ── Carrega identidade da academia (logo + nome) ──
        try {
          const { data } = await sb.from('config').select('nome_academia, logo_url').eq('id', 1).single();
          if (data) {
            const fallback = document.getElementById('brand-fallback');
            if (data.logo_url) {
              const img = document.getElementById('brand-logo');
              img.src = data.logo_url;
              img.style.display = 'block';
              fallback.style.display = 'none';
            } else if (data.nome_academia) {
              const initials = data.nome_academia.split(' ').filter(Boolean).map(p => p[0]).join('').slice(0,2).toUpperCase();
              fallback.textContent = initials;
            }
            if (data.nome_academia) {
              document.title = data.nome_academia;
              const parts = data.nome_academia.split(' ');
              const last = parts.pop();
              document.getElementById('brand-name').innerHTML =
                (parts.join(' ') + (parts.length ? ' ' : '')) + '<em>' + last + '</em>';
            }
          }
        } catch (e) { /* segue mesmo sem config */ }

        // Se já logado → redireciona
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          window.location.href = '/app.html';
          return;
        }

        // ── Login por e-mail/senha ──
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          showError('');
          submitBtn.disabled = true;
          submitBtn.textContent = 'Entrando...';

          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;

          try {
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) throw error;
            window.location.href = '/app.html';
          } catch (err) {
            console.error('[login] Erro:', err);
            showError(err.message === 'Invalid login credentials'
              ? 'E-mail ou senha inválidos.'
              : 'Erro: ' + err.message);
            submitBtn.disabled = false;
            submitBtn.textContent = 'Entrar';
          }
        });

        // ── Login com Google ──
        googleBtn.addEventListener('click', async () => {
          showError('');
          googleBtn.disabled = true;
          try {
            const { error } = await sb.auth.signInWithOAuth({
              provider: 'google',
              options: {
                redirectTo: window.location.origin + '/app.html'
              }
            });
            if (error) throw error;
            // Vai redirecionar — sem ação aqui
          } catch (err) {
            console.error('[login google] Erro:', err);
            showError(err.message.includes('provider is not enabled')
              ? 'Login com Google ainda não está habilitado.'
              : 'Erro: ' + err.message);
            googleBtn.disabled = false;
          }
        });

        // ── Esqueceu a senha ──
        forgotBtn.addEventListener('click', async () => {
          const email = document.getElementById('email').value.trim();
          if (!email) {
            showError('Digite seu e-mail acima primeiro.');
            return;
          }
          try {
            const { error } = await sb.auth.resetPasswordForEmail(email, {
              redirectTo: window.location.origin + '/index.html'
            });
            if (error) throw error;
            showError('Link de recuperação enviado pro seu e-mail.', true);
          } catch (err) {
            showError('Erro: ' + err.message);
          }
        });

      } catch (err) {
        console.error('[login] Erro de inicialização:', err);
        showError('Erro ao carregar. Recarregue a página.');
      }
    }

    init();
  })();
  </script>
</body>
</html>
