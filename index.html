<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>/* PWA-KILL-SWITCH */ try { if ("serviceWorker" in navigator) { navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => { try { r.unregister(); } catch(e){} })).catch(()=>{}); } if (window.caches) { caches.keys().then(ks => ks.forEach(k => caches.delete(k))).catch(()=>{}); } } catch(e){}</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <title>Login</title>

  <link rel="icon" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="app.css?v=8">
</head>
<body class="login-page">
  <div class="login-wrap">
    <div class="login-box">
      <img id="brand-logo" src="" alt="" style="display:none;width:70px;height:70px;object-fit:contain;margin:0 auto 14px;display:none;border-radius:4px">
      <div class="login-logo" id="brand-name">·</div>
      <div class="login-sub">Acesso ao aplicativo</div>

      <form id="login-form" autocomplete="on">
        <div class="form-row">
          <label class="form-label" for="email">E-mail</label>
          <input class="form-input" type="email" id="email" required autocomplete="email" placeholder="seu@email.com">
        </div>
        <div class="form-row">
          <label class="form-label" for="password">Senha</label>
          <input class="form-input" type="password" id="password" required autocomplete="current-password" placeholder="••••••••">
        </div>
        <div class="form-err" id="err-msg"></div>
        <button class="form-submit" type="submit" id="submit-btn">Entrar</button>
      </form>

      <div class="login-hint">
        Não tem conta? <a href="/cadastro.html" style="color:var(--txt);text-decoration:underline;font-weight:500">Cadastre-se</a>
      </div>
    </div>
  </div>

  <!-- Supabase SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- Config -->
  <script src="config.js"></script>
  <!-- Login logic -->
  <script>
  (function() {
    'use strict';

    const errEl = document.getElementById('err-msg');
    const submitBtn = document.getElementById('submit-btn');
    const form = document.getElementById('login-form');

    // Aguarda o cliente Supabase ficar pronto (até 5 segundos)
    function waitForSb(maxTries = 50) {
      return new Promise((resolve, reject) => {
        let tries = 0;
        const check = () => {
          if (window.sb && window.sb.auth) return resolve(window.sb);
          tries++;
          if (tries >= maxTries) return reject(new Error('Supabase não inicializou'));
          setTimeout(check, 100);
        };
        check();
      });
    }

    async function init() {
      try {
        const sb = await waitForSb();
        console.log('[login] Supabase pronto');

        // Carrega config da academia (logo + nome) - não bloqueia login se falhar
        try {
          const { data } = await sb.from('config').select('nome_academia, logo_url, brand_color').eq('id', 1).single();
          if (data) {
            if (data.brand_color && /^#[0-9a-fA-F]{6}$/.test(data.brand_color)) {
              document.documentElement.style.setProperty('--brand', data.brand_color);
            }
            if (data.logo_url) {
              const img = document.getElementById('brand-logo');
              img.src = data.logo_url;
              img.style.display = 'block';
            }
            if (data.nome_academia) {
              document.title = data.nome_academia;
              const parts = data.nome_academia.split(' ');
              const last = parts.pop();
              document.getElementById('brand-name').innerHTML =
                parts.join(' ') + (parts.length ? ' ' : '') + '<em>' + last + '</em>';
            }
          }
        } catch (e) { /* segue mesmo sem config */ }

        // Já logado? Redireciona
        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          window.location.href = '/app.html';
          return;
        }

        // Listener do form
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          errEl.textContent = '';
          submitBtn.disabled = true;
          submitBtn.textContent = 'Entrando...';

          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;

          try {
            const { error } = await sb.auth.signInWithPassword({ email, password });
            if (error) throw error;
            window.location.href = '/app.html';
          } catch (err) {
            console.error('[login] Erro:', err);
            errEl.textContent = err.message === 'Invalid login credentials'
              ? 'E-mail ou senha inválidos.'
              : 'Erro: ' + err.message;
            submitBtn.disabled = false;
            submitBtn.textContent = 'Entrar';
          }
        });
      } catch (err) {
        console.error('[login] Erro de inicialização:', err);
        errEl.textContent = 'Erro ao carregar o app. Recarregue a página.';
      }
    }

    init();
  })();
  </script>
</body>
</html>
