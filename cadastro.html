<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <script>/* PWA-KILL-SWITCH */ try { if ("serviceWorker" in navigator) { navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => { try { r.unregister(); } catch(e){} })).catch(()=>{}); } if (window.caches) { caches.keys().then(ks => ks.forEach(k => caches.delete(k))).catch(()=>{}); } } catch(e){}</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080808">
  <title>Cadastro</title>

  <link rel="icon" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/dist/tabler-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="app.css?v=13">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="login-page">
  <div class="login-wrap">

    <!-- ETAPA 1: Cadastro -->
    <div class="login-box" id="signup-step">
      <img id="brand-logo" src="" alt="" style="display:none;width:70px;height:70px;object-fit:contain;margin:0 auto 14px;border-radius:4px">
      <div class="login-logo" id="brand-name">·</div>
      <div class="login-sub">Cadastro de aluno · Etapa 1 de 2</div>

      <form id="signup-form" autocomplete="on">
        <div class="form-row">
          <label class="form-label" for="nome">Nome completo</label>
          <input class="form-input" type="text" id="nome" required autocomplete="name" placeholder="Seu nome completo">
        </div>
        <div class="form-row">
          <label class="form-label" for="email">E-mail</label>
          <input class="form-input" type="email" id="email" required autocomplete="email" placeholder="seu@email.com">
        </div>
        <div class="form-row">
          <label class="form-label" for="password">Crie uma senha</label>
          <input class="form-input" type="password" id="password" required minlength="6" autocomplete="new-password" placeholder="Mínimo 6 caracteres">
        </div>

        <div id="termo-area" style="display:none;margin-top:18px;padding-top:18px;border-top:0.5px solid var(--border)">
          <label class="form-label" style="margin-bottom:10px">Termo de aceite</label>
          <div id="termo-box" style="max-height:200px;overflow-y:auto;background:var(--b);border:0.5px solid var(--border);border-radius:2px;padding:14px;font-size:12px;color:var(--txt2);line-height:1.6;white-space:pre-wrap;margin-bottom:10px"></div>
          <a id="termo-pdf-link" href="#" target="_blank" style="display:none;font-size:11px;color:var(--txt2);text-decoration:underline;margin-bottom:10px"><i class="ti ti-file-text" aria-hidden="true"></i> Baixar PDF do termo</a>
          <label style="display:flex;align-items:flex-start;gap:8px;cursor:pointer;font-size:12px;color:var(--txt);margin-top:8px">
            <input type="checkbox" id="termo-checkbox" style="margin-top:3px;flex-shrink:0">
            <span>Li e aceito o termo acima</span>
          </label>
        </div>

        <div class="form-err" id="err-msg"></div>
        <div class="form-ok" id="ok-msg" style="color:#7ac890;font-size:12px;text-align:center;margin:8px 0;min-height:18px"></div>
        <button class="form-submit" type="submit" id="submit-btn">Cadastrar</button>
      </form>

      <div class="login-hint">
        <i class="ti ti-info-circle" aria-hidden="true"></i>
        Já tem conta? <a href="/" style="color:var(--txt2);text-decoration:underline;margin-left:4px">Entrar</a>
      </div>
    </div>

    <!-- ETAPA 2: Foto de perfil (opcional) -->
    <div class="login-box" id="photo-step" style="display:none">
      <div class="login-sub" style="text-align:center;margin-bottom:6px">Etapa 2 de 2</div>
      <div class="login-logo" style="font-size:26px;margin-bottom:6px">FOTO DE PERFIL</div>
      <p style="text-align:center;font-size:12px;color:var(--txt3);margin:0 0 22px;line-height:1.5">
        Ajuda o professor a te identificar no tatame.<br>Você pode adicionar depois também.
      </p>

      <div class="photo-upload-area">
        <div class="photo-preview" id="photo-preview">
          <i class="ti ti-user" aria-hidden="true"></i>
        </div>
        <button class="photo-camera-btn" type="button" onclick="document.getElementById('photo-input').click()" aria-label="Escolher foto">
          <i class="ti ti-camera" aria-hidden="true"></i>
        </button>
      </div>

      <input type="file" id="photo-input" accept="image/jpeg,image/png,image/webp" style="display:none">

      <div class="form-err" id="photo-err"></div>

      <button class="form-submit" type="button" id="photo-submit-btn" disabled>Enviar foto e continuar</button>
      <button class="login-link-btn" type="button" id="photo-skip-btn">Pular por enquanto →</button>
    </div>

  </div>

  <script src="config.js"></script>
  <script>
  (function() {
    'use strict';

    const errEl = document.getElementById('err-msg');
    const okEl = document.getElementById('ok-msg');
    const submitBtn = document.getElementById('submit-btn');
    const form = document.getElementById('signup-form');

    let novoUsuarioId = null;
    let fotoSelecionada = null;

    function waitForSb(maxTries) {
      maxTries = maxTries || 50;
      return new Promise((resolve, reject) => {
        let tries = 0;
        const check = () => {
          if (window.sb && window.sb.auth) return resolve(window.sb);
          tries++;
          if (tries >= maxTries) return reject(new Error('Supabase não inicializou'));
          setTimeout(check, 100);
        };
        check();
      });
    }

    function redimensionarImagem(file, maxSize) {
      maxSize = maxSize || 400;
      return new Promise((resolve, reject) => {
        const img = new Image();
        const reader = new FileReader();
        reader.onload = (e) => { img.src = e.target.result; };
        reader.onerror = reject;
        img.onload = () => {
          const minSide = Math.min(img.width, img.height);
          const sx = (img.width - minSide) / 2;
          const sy = (img.height - minSide) / 2;
          const canvas = document.createElement('canvas');
          canvas.width = maxSize;
          canvas.height = maxSize;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, sx, sy, minSide, minSide, 0, 0, maxSize, maxSize);
          canvas.toBlob(
            (blob) => blob ? resolve(new File([blob], 'avatar.jpg', { type: 'image/jpeg' })) : reject(new Error('Falha ao processar')),
            'image/jpeg',
            0.88
          );
        };
        img.onerror = () => reject(new Error('Imagem inválida'));
        reader.readAsDataURL(file);
      });
    }

    function mostrarPreviewFoto(file) {
      const reader = new FileReader();
      reader.onload = (e) => {
        const preview = document.getElementById('photo-preview');
        preview.innerHTML = '';
        preview.classList.add('with-image');
        const img = document.createElement('img');
        img.src = e.target.result;
        preview.appendChild(img);
      };
      reader.readAsDataURL(file);
    }

    function avancarParaFoto(userId) {
      novoUsuarioId = userId;
      document.getElementById('signup-step').style.display = 'none';
      document.getElementById('photo-step').style.display = 'flex';
    }

    function finalizarEEntrar() {
      window.location.href = '/app.html';
    }

    async function init() {
      try {
        const sb = await waitForSb();

        let termoConfig = { termo_ativo: false, termo_texto: null, termo_pdf_url: null };
        try {
          const { data } = await sb.from('config').select('nome_academia, logo_url, termo_ativo, termo_texto, termo_pdf_url').eq('id', 1).single();
          if (data) {
            if (data.logo_url) {
              const img = document.getElementById('brand-logo');
              img.src = data.logo_url;
              img.style.display = 'block';
            }
            if (data.nome_academia) {
              document.title = 'Cadastro — ' + data.nome_academia;
              const parts = data.nome_academia.split(' ');
              const last = parts.pop();
              document.getElementById('brand-name').innerHTML =
                parts.join(' ') + (parts.length ? ' ' : '') + '<em>' + last + '</em>';
            }
            termoConfig = {
              termo_ativo: data.termo_ativo || false,
              termo_texto: data.termo_texto || null,
              termo_pdf_url: data.termo_pdf_url || null
            };
          }
        } catch (e) { /* segue */ }

        if (termoConfig.termo_ativo && (termoConfig.termo_texto || termoConfig.termo_pdf_url)) {
          document.getElementById('termo-area').style.display = 'block';
          if (termoConfig.termo_texto) {
            document.getElementById('termo-box').textContent = termoConfig.termo_texto;
          } else {
            document.getElementById('termo-box').style.display = 'none';
          }
          if (termoConfig.termo_pdf_url) {
            const link = document.getElementById('termo-pdf-link');
            link.href = termoConfig.termo_pdf_url;
            link.style.display = 'inline-block';
          }
        }

        const { data: { session } } = await sb.auth.getSession();
        if (session) {
          window.location.href = '/app.html';
          return;
        }

        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          errEl.textContent = '';
          okEl.textContent = '';

          if (termoConfig.termo_ativo) {
            if (!document.getElementById('termo-checkbox').checked) {
              errEl.textContent = 'Você precisa aceitar o termo para se cadastrar.';
              return;
            }
          }

          submitBtn.disabled = true;
          submitBtn.textContent = 'Cadastrando...';

          const nome = document.getElementById('nome').value.trim();
          const email = document.getElementById('email').value.trim();
          const password = document.getElementById('password').value;

          try {
            const { data, error } = await sb.auth.signUp({
              email, password,
              options: { data: { nome, faixa: 'white', role: 'aluno' } }
            });
            if (error) throw error;

            if (termoConfig.termo_ativo && data.user) {
              try {
                let ip = null;
                try {
                  const r = await fetch('https://api.ipify.org?format=json');
                  const d = await r.json();
                  ip = d.ip;
                } catch (e) { /* ok */ }
                await sb.from('termo_aceites').insert({
                  aluno_id: data.user.id, ip,
                  user_agent: navigator.userAgent,
                  termo_texto_snapshot: termoConfig.termo_texto,
                  termo_pdf_url_snapshot: termoConfig.termo_pdf_url
                });
              } catch (e) { console.warn('[termo] falha:', e); }
            }

            // Tem sessão (autoconfirma) → vai pra foto
            if (data.session && data.user) {
              avancarParaFoto(data.user.id);
              return;
            }

            // Sem sessão → confirmar email primeiro
            okEl.textContent = 'Cadastro feito! Confirme seu e-mail e faça login pra adicionar a foto.';
            form.reset();
            submitBtn.textContent = 'Cadastrar';
            submitBtn.disabled = false;
          } catch (err) {
            console.error('[signup] erro:', err);
            const msg = err.message || '';
            if (msg.toLowerCase().includes('already registered') || msg.toLowerCase().includes('user already')) {
              errEl.textContent = 'Este e-mail já está cadastrado. Faça login.';
            } else if (msg.toLowerCase().includes('password')) {
              errEl.textContent = 'A senha precisa ter no mínimo 6 caracteres.';
            } else {
              errEl.textContent = 'Erro: ' + msg;
            }
            submitBtn.disabled = false;
            submitBtn.textContent = 'Cadastrar';
          }
        });

        // ── ETAPA 2: Foto ──
        const photoInput = document.getElementById('photo-input');
        const photoSubmit = document.getElementById('photo-submit-btn');
        const photoSkip = document.getElementById('photo-skip-btn');
        const photoErr = document.getElementById('photo-err');

        photoInput.addEventListener('change', (e) => {
          const file = e.target.files && e.target.files[0];
          if (!file) return;
          if (file.size > 8 * 1024 * 1024) {
            photoErr.textContent = 'Imagem muito grande (máx 8MB).';
            return;
          }
          photoErr.textContent = '';
          fotoSelecionada = file;
          mostrarPreviewFoto(file);
          photoSubmit.disabled = false;
        });

        photoSubmit.addEventListener('click', async () => {
          if (!fotoSelecionada || !novoUsuarioId) {
            finalizarEEntrar();
            return;
          }
          photoErr.textContent = '';
          photoSubmit.disabled = true;
          photoSubmit.textContent = 'Enviando...';
          try {
            const resized = await redimensionarImagem(fotoSelecionada);
            const filename = novoUsuarioId + '-' + Date.now() + '.jpg';

            const { error: upErr } = await sb.storage
              .from('avatars')
              .upload(filename, resized, { cacheControl: '3600', upsert: false, contentType: 'image/jpeg' });
            if (upErr) throw upErr;

            const { data } = sb.storage.from('avatars').getPublicUrl(filename);
            const { error: updErr } = await sb.from('profiles')
              .update({ avatar_url: data.publicUrl })
              .eq('id', novoUsuarioId);
            if (updErr) throw updErr;

            finalizarEEntrar();
          } catch (err) {
            console.error('[avatar cadastro]', err);
            photoErr.textContent = 'Erro: ' + err.message + '. Você pode adicionar depois no perfil.';
            photoSubmit.disabled = false;
            photoSubmit.textContent = 'Tentar de novo';
          }
        });

        photoSkip.addEventListener('click', finalizarEEntrar);

      } catch (err) {
        errEl.textContent = 'Erro ao carregar. Recarregue a página.';
      }
    }

    init();
  })();
  </script>
</body>
</html>
