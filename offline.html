<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a0a">
  <title>Sem conexão · Garage Training</title>
  <link rel="icon" href="/icon-192.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      background: #0a0a0a;
      color: #fff;
      font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
      text-align: center;
    }
    .wrap { max-width: 360px; }
    .icon {
      width: 96px; height: 96px;
      margin: 0 auto 24px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .icon::before, .icon::after {
      content: '';
      position: absolute;
      top: 50%; left: 50%;
      width: 48px; height: 3px;
      background: rgba(255,255,255,0.7);
      border-radius: 2px;
    }
    .icon::before { transform: translate(-50%, -50%) rotate(45deg); }
    .icon::after { transform: translate(-50%, -50%) rotate(-45deg); }
    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 3px;
      margin: 0 0 12px;
      font-weight: 500;
    }
    p {
      color: rgba(255,255,255,0.55);
      font-size: 14px;
      line-height: 1.6;
      margin: 0 0 24px;
    }
    button {
      width: 100%;
      padding: 14px;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      letter-spacing: 3px;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      font-family: inherit;
      min-height: 48px;
    }
    button:active { opacity: 0.7; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="icon"></div>
    <h1>SEM CONEXÃO</h1>
    <p>
      Algumas funções podem não estar disponíveis,<br>
      mas você pode continuar usando o que já carregou.
    </p>
    <button onclick="location.reload()">Tentar de novo</button>
  </div>
  
  <script>
    // Quando a conexão voltar, recarrega automático
    window.addEventListener('online', () => location.reload());
  </script>
</body>
</html>
